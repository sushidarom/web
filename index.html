<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
	<title>Суши Даром</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		html, body {
			height: 100%;
			font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
			background: #0a0500;
			color: #f0e3d4;
			overflow-x: hidden;
		}
		body {
			display: flex;
			flex-direction: column;
			padding-top: 76px;
		}
		.bg-glow {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
			pointer-events: none;
			background:
				radial-gradient(ellipse at 85% 15%, rgba(255, 120, 0, 0.25) 0%, transparent 55%),
				radial-gradient(ellipse at 15% 85%, rgba(255, 80, 0, 0.18) 0%, transparent 50%),
				radial-gradient(ellipse at 50% 50%, rgba(255, 60, 0, 0.04) 0%, transparent 70%);
		}
		.container {
			position: relative;
			z-index: 10;
			max-width: 1300px;
			margin: 0 auto;
			padding: 0 1.2rem 1rem;
			width: 100%;
			flex: 1 0 auto;
		}

		.header {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			z-index: 100;
			background: linear-gradient(135deg, #0f0800 0%, #1c0e00 100%);
			border-bottom: 3px solid #ff7b00;
			padding: 0.7rem 1.5rem;
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 0.5rem 1.2rem;
			box-shadow: 0 4px 30px rgba(255, 123, 0, 0.12);
			backdrop-filter: blur(6px);
		}
		.logo-block {
			display: flex;
			align-items: center;
			gap: 10px;
		}
		.logo-icon {
			font-size: 1.8rem;
			color: #ff7b00;
			filter: drop-shadow(0 0 8px rgba(255, 123, 0, 0.3));
		}
		.logo-text {
			font-size: 1.6rem;
			font-weight: 900;
			background: linear-gradient(135deg, #ff9f3a, #ff5e00);
			background-clip: text;
			-webkit-background-clip: text;
			color: transparent;
			letter-spacing: -0.5px;
		}
		.header-right {
			display: flex;
			align-items: center;
			gap: 0.8rem;
		}
		.menu-toggle {
			display: none;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 123, 0, 0.2);
			border-radius: 10px;
			padding: 10px;
			cursor: pointer;
			flex-direction: column;
			gap: 5px;
			width: 44px;
			height: 44px;
			align-items: center;
			justify-content: center;
			transition: 0.3s;
			position: relative;
		}
		.menu-toggle span {
			display: block;
			width: 24px;
			height: 2.5px;
			background: #ff9f3a;
			border-radius: 3px;
			transition: all 0.3s ease;
			transform-origin: center;
		}
		.menu-toggle.active span:nth-child(1) {
			transform: translateY(7.5px) rotate(45deg);
		}
		.menu-toggle.active span:nth-child(2) {
			opacity: 0;
			transform: scaleX(0);
		}
		.menu-toggle.active span:nth-child(3) {
			transform: translateY(-7.5px) rotate(-45deg);
		}
		.header-nav {
			display: flex;
			gap: 0.8rem;
			align-items: center;
			flex-wrap: wrap;
		}
		.header-nav a {
			color: #d9c5b0;
			text-decoration: none;
			padding: 0.5rem 1.2rem;
			border-radius: 40px;
			font-weight: 600;
			font-size: 0.95rem;
			transition: all 0.25s ease;
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid transparent;
			cursor: pointer;
			white-space: nowrap;
		}
		.header-nav a:hover {
			color: #ffb05a;
			background: rgba(255, 123, 0, 0.12);
			border-color: rgba(255, 123, 0, 0.2);
		}
		.header-nav a.active {
			color: #0b0600;
			background: #ff7b00;
			border-color: #ff7b00;
			box-shadow: 0 4px 15px rgba(255, 123, 0, 0.25);
		}
		.header-nav a.active:hover {
			background: #ff9f3a;
			border-color: #ff9f3a;
			color: #0b0600;
		}
		.header-cart-btn {
			background: rgba(255, 123, 0, 0.15);
			border: 1px solid rgba(255, 123, 0, 0.25);
			border-radius: 40px;
			padding: 0.45rem 1.2rem;
			color: #ff9f3a;
			font-weight: 600;
			font-size: 0.9rem;
			cursor: pointer;
			transition: all 0.25s ease;
			display: flex;
			align-items: center;
			gap: 8px;
			font-family: 'Inter', sans-serif;
			white-space: nowrap;
		}
		.header-cart-btn:hover {
			background: rgba(255, 123, 0, 0.25);
			border-color: #ff7b00;
			color: #ffb05a;
		}
		.header-cart-btn .badge {
			background: #ff5e00;
			color: #0b0600;
			font-weight: 800;
			font-size: 0.65rem;
			padding: 0.05rem 0.5rem;
			border-radius: 30px;
			min-width: 20px;
			text-align: center;
		}

		@media (max-width: 820px) {
			.menu-toggle {
				display: flex;
			}
			.header-nav {
				display: none;
				flex-direction: column;
				width: 100%;
				background: rgba(12, 6, 0, 0.98);
				backdrop-filter: blur(12px);
				position: absolute;
				top: 100%;
				left: 0;
				padding: 1.5rem 1.5rem 2rem;
				border-top: 2px solid #ff7b00;
				border-radius: 0 0 28px 28px;
				box-shadow: 0 20px 40px rgba(0,0,0,0.6);
				gap: 0.6rem;
			}
			.header-nav.open {
				display: flex;
				animation: slideDown 0.25s ease;
			}
			@keyframes slideDown {
				from { opacity: 0; transform: translateY(-12px); }
				to { opacity: 1; transform: translateY(0); }
			}
			.header-nav a {
				width: 100%;
				text-align: center;
				padding: 0.7rem;
				font-size: 1rem;
			}
			.header-cart-btn {
				padding: 0.3rem 0.8rem;
				font-size: 0.8rem;
			}
			.header-right {
				gap: 0.4rem;
			}
			.logo-text {
				font-size: 1.2rem;
			}
			.logo-icon {
				font-size: 1.4rem;
			}
			body {
				padding-top: 86px;
			}
		}
		@media (max-width: 480px) {
			.header {
				padding: 0.4rem 0.6rem;
				gap: 0.3rem;
			}
			.logo-text {
				font-size: 1rem;
			}
			.header-cart-btn {
				padding: 0.2rem 0.6rem;
				font-size: 0.7rem;
			}
			.menu-toggle {
				width: 38px;
				height: 38px;
				padding: 8px;
			}
			.menu-toggle span {
				width: 20px;
				height: 2px;
			}
			.menu-toggle.active span:nth-child(1) {
				transform: translateY(6px) rotate(45deg);
			}
			.menu-toggle.active span:nth-child(3) {
				transform: translateY(-6px) rotate(-45deg);
			}
			body {
				padding-top: 78px;
			}
		}

		.section-header {
			font-size: clamp(1.5rem, 4vw, 2.2rem);
			font-weight: 800;
			margin: 1.5rem 0 1.2rem;
			padding-left: 1rem;
			border-left: 5px solid #ff7b00;
			color: #ff9f3a;
		}

		.product-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 1.2rem;
			margin-bottom: 2rem;
		}
		@media (min-width: 600px) {
			.product-grid {
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
				gap: 1.8rem;
			}
		}

		.product-card {
			background: rgba(18, 9, 0, 0.9);
			backdrop-filter: blur(8px);
			border-radius: 1.5rem;
			border: 1px solid rgba(255, 123, 0, 0.3);
			overflow: hidden;
			transition: all 0.3s ease;
			cursor: pointer;
			display: flex;
			flex-direction: column;
			box-shadow: 0 4px 20px rgba(255, 123, 0, 0.06);
		}
		.product-card:hover {
			transform: translateY(-6px);
			border-color: #ff9f3a;
			box-shadow: 0 12px 40px rgba(255, 123, 0, 0.18);
		}
		.product-img {
			width: 100%;
			aspect-ratio: 16 / 10;
			object-fit: contain;  
			display: block;
			background: #1a0c00;
			min-height: 180px;
			padding: 8px;
		}
		.product-info {
			padding: 0.8rem 1rem 1rem;
			flex: 1;
			display: flex;
			flex-direction: column;
		}
		.product-title {
			font-size: 1.1rem;
			font-weight: 700;
			color: #ffdcc0;
			margin-bottom: 0.2rem;
		}
		.product-price {
			font-size: 1rem;
			font-weight: 600;
			color: #ff9f3a;
			margin-bottom: 0.3rem;
		}
		.product-price small {
			color: #b87a4a;
			font-weight: 400;
			font-size: 0.8rem;
		}
		.product-badge {
			display: inline-block;
			background: #ff7b00;
			color: #0b0600;
			font-weight: 700;
			font-size: 0.6rem;
			padding: 0.1rem 0.7rem;
			border-radius: 30px;
			align-self: flex-start;
			margin-top: 0.2rem;
			letter-spacing: 0.3px;
		}

		.cart-section {
			margin: 1.5rem 0 1rem;
			background: rgba(18, 9, 0, 0.7);
			border-radius: 1.5rem;
			border: 1px solid rgba(255, 123, 0, 0.3);
			padding: 1.2rem 1.5rem 1.5rem;
			display: none;
		}
		.cart-section.active {
			display: block;
			animation: fadeUp 0.3s ease;
		}
		@keyframes fadeUp {
			from { opacity: 0; transform: translateY(12px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.cart-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 0.8rem;
			margin-bottom: 0.8rem;
		}
		.cart-header h3 {
			font-size: 1.4rem;
			font-weight: 700;
			color: #ff9f3a;
		}
		.cart-header .cart-count {
			background: #ff7b00;
			color: #0b0600;
			font-weight: 700;
			padding: 0.1rem 0.9rem;
			border-radius: 30px;
			font-size: 0.9rem;
		}
		.cart-items {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			margin: 0.8rem 0;
		}
		.cart-item {
			display: flex;
			justify-content: space-between;
			align-items: center;
			background: rgba(15, 8, 0, 0.8);
			padding: 0.5rem 1rem;
			border-radius: 12px;
			border-left: 4px solid #ff7b00;
			flex-wrap: wrap;
			gap: 0.3rem;
		}
		.cart-item-name {
			font-weight: 500;
			font-size: 0.95rem;
		}
		.cart-item-qty {
			color: #ff9f3a;
			font-weight: 600;
			font-size: 0.9rem;
		}
		.cart-item-remove {
			background: none;
			border: none;
			color: #ff5e00;
			cursor: pointer;
			font-size: 1rem;
			padding: 0 6px;
			transition: 0.2s;
		}
		.cart-item-remove:hover {
			color: #ff3a00;
		}
		.cart-total {
			display: flex;
			justify-content: space-between;
			font-weight: 700;
			font-size: 1.2rem;
			padding-top: 0.6rem;
			border-top: 1px solid rgba(255, 123, 0, 0.3);
			margin-top: 0.4rem;
			color: #ffdcc0;
		}
		.cart-total span:last-child {
			color: #ff9f3a;
		}
		.cart-empty {
			color: #b0977e;
			text-align: center;
			padding: 0.8rem 0;
			font-weight: 400;
		}
		.cart-footer-phone {
			margin-top: 1rem;
			background: rgba(31, 15, 0, 0.7);
			border-radius: 16px;
			padding: 0.8rem 1.2rem;
			text-align: center;
			border: 1px dashed rgba(255, 123, 0, 0.4);
			font-weight: 500;
			color: #e0cdb8;
		}
		.cart-footer-phone i {
			color: #ff7b00;
			margin-right: 8px;
		}
		.cart-footer-phone strong {
			color: #ff9f3a;
			font-size: 1.1rem;
		}
		.clear-cart-btn {
			background: none;
			border: 1px solid #ff5e00;
			color: #ff5e00;
			padding: 0.25rem 1.2rem;
			border-radius: 30px;
			font-size: 0.7rem;
			cursor: pointer;
			font-weight: 600;
			transition: 0.2s;
			font-family: 'Inter', sans-serif;
		}
		.clear-cart-btn:hover {
			background: #ff5e00;
			color: #0b0600;
		}

		.payment-section {
			margin-top: 1rem;
			padding-top: 1rem;
			border-top: 1px solid rgba(255, 123, 0, 0.2);
			text-align: center;
		}
		.payment-btn {
			background: #ff7b00;
			border: none;
			padding: 0.7rem 2rem;
			border-radius: 40px;
			font-weight: 700;
			font-size: 1rem;
			color: #0b0600;
			cursor: pointer;
			transition: 0.2s;
			font-family: 'Inter', sans-serif;
			width: 100%;
			max-width: 280px;
		}
		.payment-btn:hover {
			background: #ff9f3a;
			box-shadow: 0 0 30px rgba(255, 123, 0, 0.2);
		}
		.payment-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		.qr-container {
			margin-top: 1.2rem;
			padding: 1.2rem;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 16px;
			border: 1px solid rgba(255, 123, 0, 0.2);
			display: none;
		}
		.qr-container.show {
			display: block;
			animation: fadeUp 0.5s ease;
		}
		.qr-container img {
			max-width: 200px;
			width: 100%;
			border-radius: 12px;
			background: white;
			padding: 8px;
		}
		.qr-container p {
			color: #b0977e;
			font-size: 0.85rem;
			margin-top: 8px;
		}

		footer {
			background: linear-gradient(180deg, #0f0800, #050200);
			border-top: 2px solid #ff7b00;
			padding: 1.2rem 1rem;
			text-align: center;
			position: relative;
			z-index: 10;
			flex-shrink: 0;
			width: 100%;
			margin-top: auto;
		}
		.footer-content {
			max-width: 1200px;
			margin: 0 auto;
		}
		.footer-logo {
			font-size: 1.2rem;
			font-weight: 800;
			color: #ff8c1a;
			margin-bottom: 0.3rem;
		}
		.footer-logo i {
			color: #ff7b00;
			margin-right: 6px;
		}
		.footer-phone {
			font-weight: 600;
			color: #ff9f3a;
			font-size: 1rem;
			margin: 0.3rem 0;
		}
		.footer-copy {
			font-size: 0.7rem;
			color: #b0977e;
		}

		.modal-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.9);
			backdrop-filter: blur(8px);
			z-index: 200;
			display: none;
			justify-content: center;
			align-items: center;
			padding: 1rem;
		}
		.modal-overlay.active {
			display: flex;
		}
		.modal-card {
			background: #120900;
			border: 2px solid #ff7b00;
			border-radius: 2rem;
			max-width: 480px;
			width: 100%;
			padding: 2rem 1.8rem 1.8rem;
			position: relative;
			box-shadow: 0 0 70px rgba(255, 123, 0, 0.1);
			max-height: 95vh;
			overflow-y: auto;
		}
		.modal-close {
			position: absolute;
			top: 12px;
			right: 18px;
			background: none;
			border: none;
			color: #ff7b00;
			font-size: 1.6rem;
			cursor: pointer;
			font-weight: 300;
			transition: 0.2s;
		}
		.modal-close:hover {
			color: #ff9f3a;
			transform: rotate(90deg);
		}
		.modal-title {
			font-size: 1.7rem;
			font-weight: 800;
			color: #ffdcc0;
			margin-bottom: 0.2rem;
		}
		.modal-price {
			font-size: 1.2rem;
			font-weight: 700;
			color: #ff9f3a;
			margin-bottom: 1.2rem;
		}
		.modal-price small {
			color: #b87a4a;
			font-weight: 400;
			font-size: 0.85rem;
		}
		.modal-options {
			display: flex;
			flex-direction: column;
			gap: 0.6rem;
			margin: 1rem 0 1.2rem;
		}
		.modal-options label {
			display: flex;
			justify-content: space-between;
			align-items: center;
			background: #1f0f00;
			padding: 0.6rem 1rem;
			border-radius: 14px;
			border: 1px solid rgba(255, 123, 0, 0.4);
			cursor: pointer;
			transition: 0.2s;
			font-weight: 500;
			color: #f0e3d4;
		}
		.modal-options label:hover {
			background: #2d1500;
			border-color: #ff9f3a;
		}
		.modal-options input[type="radio"] {
			accent-color: #ff7b00;
			width: 18px;
			height: 18px;
			cursor: pointer;
		}
		.modal-add {
			width: 100%;
			padding: 0.9rem;
			background: #ff7b00;
			border: none;
			border-radius: 40px;
			font-weight: 800;
			font-size: 1.1rem;
			color: #0b0600;
			cursor: pointer;
			transition: 0.2s;
			margin-top: 0.3rem;
			font-family: 'Inter', sans-serif;
		}
		.modal-add:hover {
			background: #ff9f3a;
			box-shadow: 0 0 35px rgba(255, 123, 0, 0.25);
			transform: scale(1.01);
		}
	</style>
</head>
<body>

<div class="bg-glow"></div>

<header class="header">
	<div class="logo-block">
		<i class="fas fa-utensils logo-icon"></i>
		<span class="logo-text">Суши Даром</span>
	</div>
	<div class="header-right">
		<div class="header-nav" id="headerNav">
			<a class="active" data-tab="rolls">Роллы</a>
			<a data-tab="sets">Сеты</a>
			<a data-tab="cart">Корзина</a>
		</div>
		<button class="menu-toggle" id="menuToggle" aria-label="Меню">
			<span></span>
			<span></span>
			<span></span>
		</button>
		<button class="header-cart-btn" id="headerCartBtn">
			<i class="fas fa-shopping-bag"></i>
			<span class="badge" id="headerBadge">0</span>
		</button>
	</div>
</header>

<div class="container">
	<div class="section-header" id="sectionTitle">🍣 Роллы</div>
	<div class="product-grid" id="productGrid"></div>

	<div class="cart-section" id="cartSection">
		<div class="cart-header">
			<h3><i class="fas fa-shopping-bag" style="color:#ff7b00;margin-right:8px;"></i>Корзина</h3>
			<span class="cart-count" id="cartCount">0</span>
		</div>
		<div class="cart-items" id="cartItems">
			<div class="cart-empty">Корзина пуста</div>
		</div>
		<div class="cart-total">
			<span>Итого:</span>
			<span id="cartTotal">0 ₽</span>
		</div>
		<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem;">
			<button class="clear-cart-btn" id="clearCartBtn"><i class="fas fa-trash-alt"></i> Очистить</button>
			<button class="payment-btn" id="paymentBtn"><i class="fas fa-credit-card"></i> Оплатить СБП</button>
		</div>
		<div class="qr-container" id="qrContainer">
			<img id="qrImage" src="https://i.ibb.co/m1XncMH/IMG-5145.pngsize=250x250&data=СБП+оплата+Суши+Даром" alt="QR-код для оплаты">
			<p>Наведите камеру телефона для оплаты через СБП</p>
		</div>
		<div class="cart-footer-phone">
			<i class="fas fa-phone-alt"></i> Для заказа обратитесь к сотрудникам по номеру <br><strong>+7 (988) 278-64-31</strong>
		</div>
	</div>
</div>

<footer>
	<div class="footer-content">
		<div class="footer-logo"><i class="fas fa-utensils"></i> Суши Даром</div>
		<div class="footer-phone"><i class="fas fa-phone-alt" style="color:#ff7b00;"></i> +7 (988) 278-64-31</div>
		<div class="footer-copy">© 2026 · Все права защищены</div>
	</div>
</footer>

<div class="modal-overlay" id="modalOverlay">
	<div class="modal-card">
		<button class="modal-close" id="modalClose">&times;</button>
		<div class="modal-title" id="modalTitle">Название</div>
		<div class="modal-price" id="modalPrice">999 ₽ <small>за 8 шт</small></div>
		<div class="modal-options" id="modalOptions"></div>
		<button class="modal-add" id="modalAddBtn"><i class="fas fa-cart-plus"></i> Добавить в корзину</button>
	</div>
</div>

<script>
	const products = [
		{
			id: 'philadelphia',
			name: 'Грёбаные чимичанги',
			category: 'rolls',
			img: 'https://i.ibb.co/5hhqGVn0/IMG-5135.jpg',
			variants: [
				{ label: '16 шт', value: 16, price: 469 },
				{ label: '32 шт', value: 32, price: 899 }
			]
		},
		{
			id: 'california',
			name: 'Запечённый кремпай',
			category: 'rolls',
			img: 'https://i.ibb.co/LzGBMFBC/IMG-5136.jpg',
			variants: [
				{ label: '16 шт', value: 16, price:  489 },
				{ label: '32 шт', value: 32, price:  899 },
			]
		},
		{
			id: 'unagi',
			name: 'Уринаги маки (обычные)',
			category: 'rolls',
			img: 'https://i.ibb.co/76DfbjC/IMG-5139.jpg',
			variants: [
				{ label: '16 шт', value: 16, price: 599 },
				{ label: '32 шт', value: 32, price: 1189 },
			]
		},
		{
			id: 'spicy_tuna',
			name: 'Запечённый бизюн',
			category: 'rolls',
			img: 'https://i.ibb.co/C55s4mnq/IMG-5144.jpg',
			variants: [
				{ label: '16 шт', value: 16, price: 699 },
				{ label: '32 шт', value: 32, price: 1269 },
			]
		},
		{
			id: 'set_small',
			name: 'Сет «Букаке»',
			category: 'sets',
			img: 'https://i.ibb.co/1f9mhXRG/IMG-5134.jpg',
			variants: [
				{ label: '24 шт', value: 24, price: 699 },
			]
		},
		{
			id: 'set_big',
			name: 'Сет «Уретра»',
			category: 'sets',
			img: 'https://i.ibb.co/LXqNb4PB/IMG-5137.jpg',
			variants: [
				{ label: '24 шт', value: 24, price: 699 }
			]
		}
	];

	let currentProduct = null;
	let selectedVariant = null;
	let cart = JSON.parse(localStorage.getItem('sushiCart')) || [];
	let currentTab = 'rolls';
	let paymentTimer = null;

	function renderProducts(filter) {
		const grid = document.getElementById('productGrid');
		const sectionTitle = document.getElementById('sectionTitle');
		grid.innerHTML = '';
		let filtered = products;
		if (filter === 'sets') {
			filtered = products.filter(p => p.category === 'sets');
			sectionTitle.textContent = '🍱 Сеты';
		} else {
			filtered = products.filter(p => p.category === 'rolls');
			sectionTitle.textContent = '🍣 Роллы';
		}
		filtered.forEach(p => {
			const card = document.createElement('div');
			card.className = 'product-card';
			const defaultVar = p.variants[0];
			card.innerHTML = `
				<img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/600x338/1a0c00/ff7b00?text=${encodeURIComponent(p.name)}'">
				<div class="product-info">
					<div class="product-title">${p.name}</div>
					<div class="product-price">${defaultVar.price} ₽ <small>за ${defaultVar.label}</small></div>
					<span class="product-badge">${p.category === 'sets' ? 'СЕТ' : 'РОЛЛ'}</span>
				</div>
			`;
			card.addEventListener('click', () => openModal(p.id));
			grid.appendChild(card);
		});
	}

	function openModal(productId) {
		const product = products.find(p => p.id === productId);
		if (!product) return;
		currentProduct = product;
		selectedVariant = product.variants[0];
		document.getElementById('modalTitle').textContent = product.name;
		document.getElementById('modalPrice').innerHTML = `${selectedVariant.price} ₽ <small>за ${selectedVariant.label}</small>`;
		const optionsContainer = document.getElementById('modalOptions');
		optionsContainer.innerHTML = '';
		product.variants.forEach((v, idx) => {
			const label = document.createElement('label');
			const radio = document.createElement('input');
			radio.type = 'radio';
			radio.name = 'variant';
			radio.value = idx;
			if (idx === 0) radio.checked = true;
			radio.addEventListener('change', () => {
				selectedVariant = product.variants[idx];
				document.getElementById('modalPrice').innerHTML = `${selectedVariant.price} ₽ <small>за ${selectedVariant.label}</small>`;
			});
			label.appendChild(radio);
			label.appendChild(document.createTextNode(` ${v.label} — ${v.price} ₽`));
			optionsContainer.appendChild(label);
		});
		document.getElementById('modalOverlay').classList.add('active');
		document.body.style.overflow = 'hidden';
	}

	function closeModal() {
		document.getElementById('modalOverlay').classList.remove('active');
		document.body.style.overflow = '';
	}

	function addToCart() {
		if (!currentProduct || !selectedVariant) return;
		const existing = cart.find(item => item.id === currentProduct.id && item.variantValue === selectedVariant.value);
		if (existing) {
			existing.qty += 1;
		} else {
			cart.push({
				id: currentProduct.id,
				name: currentProduct.name,
				variantValue: selectedVariant.value,
				variantLabel: selectedVariant.label,
				price: selectedVariant.price,
				qty: 1
			});
		}
		localStorage.setItem('sushiCart', JSON.stringify(cart));
		closeModal();
		renderCart();
		updateBadge();
		if (currentTab === 'cart') renderCartSection();
	}

	function renderCart() {
		const container = document.getElementById('cartItems');
		const totalSpan = document.getElementById('cartTotal');
		const countSpan = document.getElementById('cartCount');
		if (cart.length === 0) {
			container.innerHTML = '<div class="cart-empty">Корзина пуста</div>';
			totalSpan.textContent = '0 ₽';
			countSpan.textContent = '0';
			document.getElementById('paymentBtn').disabled = true;
			return;
		}
		let html = '';
		let total = 0;
		let count = 0;
		cart.forEach((item, index) => {
			const subtotal = item.price * item.qty;
			total += subtotal;
			count += item.qty;
			html += `
				<div class="cart-item">
					<span class="cart-item-name">${item.name} (${item.variantLabel})</span>
					<span class="cart-item-qty">${item.qty} шт × ${item.price} ₽</span>
					<button class="cart-item-remove" data-index="${index}"><i class="fas fa-times"></i></button>
				</div>
			`;
		});
		container.innerHTML = html;
		totalSpan.textContent = total + ' ₽';
		countSpan.textContent = count;
		document.getElementById('paymentBtn').disabled = false;
		document.querySelectorAll('.cart-item-remove').forEach(btn => {
			btn.addEventListener('click', (e) => {
				const idx = parseInt(e.currentTarget.dataset.index);
				cart.splice(idx, 1);
				localStorage.setItem('sushiCart', JSON.stringify(cart));
				renderCart();
				updateBadge();
				if (currentTab === 'cart') renderCartSection();
			});
		});
	}

	function renderCartSection() {
		const section = document.getElementById('cartSection');
		section.classList.add('active');
		document.getElementById('productGrid').style.display = 'none';
		document.getElementById('sectionTitle').style.display = 'none';
		renderCart();
		document.getElementById('qrContainer').classList.remove('show');
		if (paymentTimer) {
			clearTimeout(paymentTimer);
			paymentTimer = null;
		}
	}

	function hideCartSection() {
		document.getElementById('cartSection').classList.remove('active');
		document.getElementById('productGrid').style.display = 'grid';
		document.getElementById('sectionTitle').style.display = 'block';
		document.getElementById('qrContainer').classList.remove('show');
		if (paymentTimer) {
			clearTimeout(paymentTimer);
			paymentTimer = null;
		}
	}

	function updateBadge() {
		const badge = document.getElementById('headerBadge');
		const count = cart.reduce((sum, item) => sum + item.qty, 0);
		badge.textContent = count;
	}

	function handlePayment() {
		const qrContainer = document.getElementById('qrContainer');
		const paymentBtn = document.getElementById('paymentBtn');
		if (cart.length === 0) return;
		if (paymentTimer) {
			clearTimeout(paymentTimer);
			paymentTimer = null;
		}
		qrContainer.classList.remove('show');
		paymentBtn.disabled = true;
		paymentBtn.textContent = '⏳ Генерация...';
		setTimeout(() => {
			qrContainer.classList.add('show');
			paymentBtn.disabled = false;
			paymentBtn.innerHTML = '<i class="fas fa-credit-card"></i> Оплатить СБП';
			paymentTimer = setTimeout(() => {
				qrContainer.classList.remove('show');
				paymentTimer = null;
			}, 60000);
		}, 7000);
	}

	document.addEventListener('DOMContentLoaded', () => {
		renderProducts('rolls');
		renderCart();
		updateBadge();

		const menuToggle = document.getElementById('menuToggle');
		const headerNav = document.getElementById('headerNav');

		menuToggle.addEventListener('click', (e) => {
			e.stopPropagation();
			headerNav.classList.toggle('open');
			menuToggle.classList.toggle('active');
		});

		document.addEventListener('click', (e) => {
			if (!e.target.closest('.header') && !e.target.closest('.menu-toggle')) {
				headerNav.classList.remove('open');
				menuToggle.classList.remove('active');
			}
		});

		document.querySelectorAll('.header-nav a').forEach(tab => {
			tab.addEventListener('click', (e) => {
				e.preventDefault();
				const filter = tab.dataset.tab;
				if (!filter) return;
				
				document.querySelectorAll('.header-nav a').forEach(t => t.classList.remove('active'));
				tab.classList.add('active');
				headerNav.classList.remove('open');
				menuToggle.classList.remove('active');
				
				if (filter === 'cart') {
					currentTab = 'cart';
					renderCartSection();
					return;
				}
				currentTab = filter;
				hideCartSection();
				renderProducts(filter);
			});
		});

		document.getElementById('headerCartBtn').addEventListener('click', () => {
			document.querySelectorAll('.header-nav a').forEach(t => t.classList.remove('active'));
			const cartTab = document.querySelector('.header-nav a[data-tab="cart"]');
			if (cartTab) cartTab.classList.add('active');
			headerNav.classList.remove('open');
			menuToggle.classList.remove('active');
			currentTab = 'cart';
			renderCartSection();
		});

		document.getElementById('modalClose').addEventListener('click', closeModal);
		document.getElementById('modalOverlay').addEventListener('click', (e) => {
			if (e.target === e.currentTarget) closeModal();
		});
		document.getElementById('modalAddBtn').addEventListener('click', addToCart);

		document.getElementById('clearCartBtn').addEventListener('click', () => {
			if (confirm('Очистить корзину?')) {
				cart = [];
				localStorage.setItem('sushiCart', JSON.stringify(cart));
				renderCart();
				updateBadge();
				if (currentTab === 'cart') renderCartSection();
				document.getElementById('qrContainer').classList.remove('show');
				if (paymentTimer) {
					clearTimeout(paymentTimer);
					paymentTimer = null;
				}
			}
		});

		document.getElementById('paymentBtn').addEventListener('click', handlePayment);

		document.addEventListener('keydown', (e) => {
			if (e.key === 'Escape') closeModal();
		});
	});
</script>
</body>
</html>
